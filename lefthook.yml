pre-commit:
  commands:
    oxfmt:
      run: bunx oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    oxlint:
      glob: "*.{js,jsx,ts,tsx}"
      run: bunx oxlint --fix {staged_files}
      stage_fixed: true

post-checkout:
  scripts:
    "setup-worktree":
      runner: sh
